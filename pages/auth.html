<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalmPath — Entrar / Criar conta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <a href="../index.html" class="auth-logo">
        <div class="auth-logo-mark"><i class="ti ti-plant"></i></div>
        <span class="auth-logo-name">CalmPath</span>
      </a>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab auth-tab--active" id="tab-login">Entrar</button>
        <button class="auth-tab" id="tab-register">Criar conta</button>
      </div>

      <!-- Painel Login -->
      <div class="auth-panel active" id="panel-login">
        <form id="form-login" novalidate>
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="o.teu@email.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="login-password">Palavra-passe</label>
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <span class="form-error" id="login-error"></span>
          <button type="submit" class="btn-submit" id="btn-login">Entrar</button>
        </form>
        <p class="auth-switch">
          Ainda não tens conta?
          <a data-toggle="register">Criar conta grátis</a>
        </p>
      </div>

      <!-- Painel Registo -->
      <div class="auth-panel" id="panel-register">
        <form id="form-register" novalidate>
          <div class="form-group">
            <label for="reg-name">Nome completo</label>
            <input type="text" id="reg-name" placeholder="O teu nome" autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="o.teu@email.com" autocomplete="email" />
            <span class="form-error" id="reg-email-error"></span>
          </div>
          <div class="form-group">
            <label for="reg-password">Palavra-passe</label>
            <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
          </div>
          <div class="form-group">
            <label for="reg-confirm">Confirmar palavra-passe</label>
            <input type="password" id="reg-confirm" placeholder="Repete a palavra-passe" autocomplete="new-password" />
            <span class="form-error" id="reg-confirm-error"></span>
          </div>
          <button type="submit" class="btn-submit" id="btn-register">Criar conta grátis</button>
        </form>
        <p class="auth-switch">
          Já tens conta?
          <a data-toggle="login">Entrar</a>
        </p>
      </div>

      <!-- Voltar -->
      <a href="../pages/landingPage.html" class="back-link">
        <i class="ti ti-arrow-left"></i>
        Voltar ao início
      </a>

    </div>
  </div>

  <!-- MVC scripts — UserModel em vez de AuthModel -->
  <script src="../js/models/userModel.js"></script>
  <script src="../js/views/AuthView.js"></script>
  <script src="../js/controllers/AuthController.js"></script>

</body>
</html>
